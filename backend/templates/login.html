{% extends "base.html" %}

{% block title %}Вход — Панель управления{% endblock %}

{% block body %}
<main class="container py-5 main-content">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <h1 class="h3 mb-2">Панель управления</h1>
      <p class="text-body-secondary mb-4">Вход в панель управления</p>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form id="login-form">
            <div class="mb-3">
              <label for="username" class="form-label">Имя пользователя</label>
              <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Пароль</label>
              <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Вход</button>
          </form>
        </div>
      </div>
      <pre id="login-output" class="output mt-3 d-none"></pre>
    </div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
